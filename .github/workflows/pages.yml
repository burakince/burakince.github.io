name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium for Mermaid
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build with Next.js
        run: npm run build

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Wait for profile.json to reflect new deploy
        if: github.ref == 'refs/heads/main'
        run: |
          COMMIT_SHA="${{ github.sha }}"
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            VERSION=$(curl -sf \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              "https://www.burakince.com/profile.json" | jq -r '.version // empty')
            if [ "$VERSION" = "$COMMIT_SHA" ]; then
              echo "profile.json is up to date (version: $VERSION)"
              break
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: got '$VERSION', want '$COMMIT_SHA'. Retrying in ${SLEEP_SECONDS}s..."
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "Warning: timed out after $((MAX_ATTEMPTS * SLEEP_SECONDS))s — sending dispatch anyway"
            fi
            sleep $SLEEP_SECONDS
          done

      - name: Trigger profile README update
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.PROFILE_DISPATCH_TOKEN }}
        run: |
          gh api repos/burakince/burakince/dispatches \
            --method POST \
            --field event_type=blog-updated
